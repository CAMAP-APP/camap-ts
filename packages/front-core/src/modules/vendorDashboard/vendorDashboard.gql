}

query GetNextVendorDistributions($vendorId: Int!) {
  vendor(id: $vendorId) {
    id
    nextDistributions {
      group {
        id
        name
      }
      distributions {
        id
        date
        catalog {
          id
          name
          group {
            id
          }
        }
        orderEndDate
        orderStartDate
        place {
          id
          name
          address1
          city
          zipCode
          lng
          lat
        }
        userOrders {
          id
          quantity
          productPrice
          product {
            id
            name
            qt
            unitType
            bulk
            variablePrice
          }
          userId
          distributionId
          subscriptionId
        }
        multiDistrib {
          id
          distribStartDate
          distribEndDate
        }
        end
      }
    }
  }
}

query GetVendorDistributionsCsv($vendorId: Int!, $fromDate: DateTime) {
  vendor(id: $vendorId) {
    id
    allCatalogs {
      id
      name
      group {
        id
        name
      }
      products {
        id
        name
        qt
        unitType
        bulk
        variablePrice
        active
      }
    }
    allDistributions(fromDate: $fromDate) {
      group {
        id
      }
      distributions {
        id
        date
        catalog {
          id
        }
        userOrders {
          quantity
          product {
            id
          }
        }
      }
    }
  }
}

mutation ClaimVendor($vendorId: Int!) {
  claimVendor(vendorId: $vendorId)
}

mutation ConsolidateVendors($vendorId: Int!) {
  consolidateVendors(vendorId: $vendorId)
}