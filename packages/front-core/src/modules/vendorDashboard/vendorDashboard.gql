query GetClaimableVendors {
  getClaimableVendors {
    id
    name
    email
    phone
    city
    zipCode
    companyNumber
    image
    disabled
    activeCatalogs {
      id
      name
      startDate
      endDate
      group {
        id
        name
      }
      subscriptionsCount
    }
    allCatalogs {
      id
      name
      startDate
      endDate
      group {
        id
        name
      }
      subscriptionsCount
    }
  }
}

query GetVendorsByUserId($userId: Int!) {
  getVendorsByUserId(userId: $userId) {
    id
    name
    email
    phone
    city
    zipCode
    companyNumber
    image
    disabled
    activeCatalogs {
      id
      name
      startDate
      endDate
      group {
        id
        name
      }
      subscriptionsCount
    }
  }
}

